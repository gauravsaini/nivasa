name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    name: Publish dry-run
    if: ${{ inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Run publish dry-run
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x scripts/publish-crates.sh ]; then
            echo "::error::scripts/publish-crates.sh is required for release dry-runs."
            exit 1
          fi
          scripts/publish-crates.sh --dry-run

  publish:
    name: Publish crates.io
    if: ${{ inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Publish crates
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -x scripts/publish-crates.sh ]; then
            echo "::error::scripts/publish-crates.sh is required for crates.io publishing."
            exit 1
          fi
          scripts/publish-crates.sh
