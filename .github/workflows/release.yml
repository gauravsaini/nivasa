name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release verification without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo Check
        run: cargo check --workspace --all-targets

      - name: Cargo Test
        run: cargo test --workspace --all-targets

      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo Format
        run: cargo fmt --all --check

      - name: Cargo Doc
        run: cargo doc --workspace --no-deps

      - name: Verify generated SCXML artifacts
        run: cargo test -p nivasa-statechart --test generated_statecharts

      - name: Check packaged SCXML mirrors
        run: scripts/check-statechart-mirrors.sh

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage ratchet (line >= 91%)
        run: |
          # Ratchet gate: current honest workspace line coverage is 91.14%.
          # Raise this floor toward the 95% target as coverage lands; do not lower it.
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --fail-under-lines 91

      - name: Run benchmark smoke gate
        run: BENCHMARK_HELLO_WORLD_MAX_UPPER_US=5000 bash benches/check_hello_world_budget.sh

  dry-run:
    name: Release dry-run
    needs: release-gate
    if: ${{ inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Check packaged SCXML mirrors
        run: scripts/check-statechart-mirrors.sh

      - name: Run publish dry-run
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x scripts/publish-crates.sh ]; then
            echo "::error::scripts/publish-crates.sh is required for release dry-runs."
            exit 1
          fi
          scripts/publish-crates.sh --dry-run

  publish:
    name: Publish crates.io
    needs: release-gate
    if: ${{ inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - name: Validate publish ref
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/tags/v*)
              ;;
            *)
              echo "::error::Real publishing requires running this workflow from a version tag matching refs/tags/v*. Current ref: ${GITHUB_REF}."
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Check packaged SCXML mirrors
        run: scripts/check-statechart-mirrors.sh

      - name: Publish crates
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -x scripts/publish-crates.sh ]; then
            echo "::error::scripts/publish-crates.sh is required for crates.io publishing."
            exit 1
          fi
          scripts/publish-crates.sh --execute --wait 60
