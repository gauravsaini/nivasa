name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo Check
        run: cargo check --workspace --all-targets

      - name: Cargo Test
        run: cargo test --workspace --all-targets

      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo Format
        run: cargo fmt --all --check

      - name: Verify generated SCXML artifacts
        run: cargo test -p nivasa-statechart --test generated_statecharts

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Cargo Deny
        run: cargo deny check advisories bans licenses sources

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo Doc
        run: cargo doc --workspace --no-deps

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --no-report
