name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo Check
        run: cargo check --workspace --all-targets

      - name: Cargo Test
        run: cargo test --workspace --all-targets

      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo Format
        run: cargo fmt --all --check

      - name: Verify generated SCXML artifacts
        run: cargo test -p nivasa-statechart --test generated_statecharts

      - name: Validate SCXML
        run: cargo run -p nivasa-cli -- statechart validate --all

      - name: Check SCXML parity
        run: cargo run -p nivasa-cli -- statechart parity

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Cargo Deny
        run: cargo deny check advisories bans licenses sources

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo Doc
        run: cargo doc --workspace --no-deps

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --no-report

  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Capture changed code
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            diff_base="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
          else
            diff_base="$(git rev-parse HEAD^)"
          fi
          git diff "$diff_base"...HEAD > /tmp/mutants.diff

      - name: Run cargo-mutants
        run: cargo mutants --baseline=skip --in-place --in-diff /tmp/mutants.diff --test-workspace --profile=mutants --timeout 300
