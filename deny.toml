[advisories]
ignore = []
unmaintained = "workspace"
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Unicode-3.0"]
confidence-threshold = 0.80
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
